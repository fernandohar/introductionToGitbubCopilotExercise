name: UnoMultiplayer
options:
  bundleIdPrefix: com.unomultiplayer
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: ""

targets:
  UnoMultiplayer:
    type: application
    platform: iOS
    sources:
      - path: UnoMultiplayer
    resources:
      - path: UnoMultiplayer/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.unomultiplayer.app
        INFOPLIST_KEY_CFBundleDisplayName: Uno Multiplayer
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
    info:
      path: UnoMultiplayer/Info.plist
      properties:
        NSLocalNetworkUsageDescription: Used to discover and connect to nearby players for local multiplayer games.
        NSBluetoothAlwaysUsageDescription: Used to connect with nearby players for offline multiplayer via Bluetooth.
        NSBonjourServices:
          - _uno-game._tcp

  UnoMultiplayerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: UnoMultiplayerTests
    dependencies:
      - target: UnoMultiplayer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.unomultiplayer.app.tests

schemes:
  UnoMultiplayer:
    build:
      targets:
        UnoMultiplayer: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - UnoMultiplayerTests
